# 多引擎组合搜索示例
# 使用多个搜索引擎获取更全面的结果

# 策略说明：
# - 先用 Baidu 搜中文资源
# - 再用 Bing 搜英文资源
# - 用 DuckDuckGo 搜隐私敏感内容
# - 综合分析所有结果

# ========== 示例 1：深度调研 AI ==========

# 第一轮：中文资源
query: "大语言模型 训练方法 2024"
engine: "baidu"
count: 5

# 第二轮：英文资源
query: "LLM training techniques best practices 2024"
engine: "bing"
count: 5

# 第三轮：学术论文
query: "large language model training paper arxiv"
engine: "duckduckgo"
count: 5

